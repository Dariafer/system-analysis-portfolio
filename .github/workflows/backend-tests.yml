name: Backend tests

on:
  push:
    paths:
      - "payment-gateway-system-analysis/backend/**"
      - ".github/workflows/backend-tests.yml"
  pull_request:
    paths:
      - "payment-gateway-system-analysis/backend/**"
      - ".github/workflows/backend-tests.yml"

jobs:
  test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: payment-gateway-system-analysis/backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        env:
          PYTHONPATH: .
        run: pytest
