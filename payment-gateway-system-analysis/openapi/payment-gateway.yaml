```yaml
openapi: 3.0.3

info:
  title: Payment Gateway API
  version: 1.0.0
  description: API for creating and processing payments in a payment gateway system.

servers:
  - url: http://localhost:8000/api/v1

tags:
  - name: Payments
    description: Payment creation and status management
  - name: Acquiring
    description: Mock acquiring bank callback processing

security:
  - ApiKeyAuth: []

paths:
  /payments:
    post:
      tags:
        - Payments
      summary: Create payment
      operationId: createPayment
      parameters:
        - name: Idempotency-Key
          in: header
          required: true
          schema:
            type: string
            example: order-1001-payment-1
          description: Unique key used to prevent duplicate payment creation.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePaymentRequest"
      responses:
        "201":
          description: Payment created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentResponse"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Invalid or missing API key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Idempotency key conflict
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /payments/{payment_id}:
    get:
      tags:
        - Payments
      summary: Get payment by id
      operationId: getPaymentById
      parameters:
        - name: payment_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Payment found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentResponse"
        "401":
          description: Invalid or missing API key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Payment not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /payments/{payment_id}/cancel:
    post:
      tags:
        - Payments
      summary: Cancel payment
      operationId: cancelPayment
      parameters:
        - name: payment_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Payment cancelled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentResponse"
        "401":
          description: Invalid or missing API key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Payment not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Payment cannot be cancelled in the current status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /acquiring/callback:
    post:
      tags:
        - Acquiring
      summary: Process acquiring bank callback
      operationId: processAcquiringCallback
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AcquiringCallbackRequest"
      responses:
        "200":
          description: Callback processed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CallbackProcessingResponse"
        "400":
          description: Invalid callback payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Payment attempt not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Payment status transition is not allowed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key

  schemas:
    CreatePaymentRequest:
      type: object
      required:
        - merchant_order_id
        - amount_minor
        - currency
      properties:
        merchant_order_id:
          type: string
          example: order-1001
        amount_minor:
          type: integer
          minimum: 1
          example: 150000
        currency:
          type: string
          minLength: 3
          maxLength: 3
          example: RUB
        description:
          type: string
          nullable: true
          example: Оплата заказа order-1001

    PaymentResponse:
      type: object
      required:
        - payment_id
        - merchant_order_id
        - amount_minor
        - currency
        - status
        - created_at
      properties:
        payment_id:
          type: string
          format: uuid
          example: b3c4f7a0-7d7a-4e2d-9c21-9d9817d64b10
        merchant_order_id:
          type: string
          example: order-1001
        amount_minor:
          type: integer
          example: 150000
        currency:
          type: string
          example: RUB
        status:
          $ref: "#/components/schemas/PaymentStatus"
        created_at:
          type: string
          format: date-time
          example: 2026-06-20T12:00:00Z
        updated_at:
          type: string
          format: date-time
          nullable: true
          example: 2026-06-20T12:01:00Z

    AcquiringCallbackRequest:
      type: object
      required:
        - acquiring_request_id
        - status
      properties:
        acquiring_request_id:
          type: string
          example: acq-req-1001
        status:
          type: string
          enum:
            - SUCCEEDED
            - FAILED
          example: SUCCEEDED
        error_code:
          type: string
          nullable: true
          example: BANK_DECLINED
        error_message:
          type: string
          nullable: true
          example: Payment was declined by acquiring bank

    CallbackProcessingResponse:
      type: object
      required:
        - result
      properties:
        result:
          type: string
          example: processed

    MerchantWebhookPayload:
      type: object
      required:
        - event_id
        - event_type
        - payment_id
        - merchant_order_id
        - amount_minor
        - currency
        - status
        - created_at
      properties:
        event_id:
          type: string
          example: evt-1001
        event_type:
          type: string
          enum:
            - payment.succeeded
            - payment.failed
            - payment.cancelled
          example: payment.succeeded
        payment_id:
          type: string
          format: uuid
          example: b3c4f7a0-7d7a-4e2d-9c21-9d9817d64b10
        merchant_order_id:
          type: string
          example: order-1001
        amount_minor:
          type: integer
          example: 150000
        currency:
          type: string
          example: RUB
        status:
          $ref: "#/components/schemas/PaymentStatus"
        created_at:
          type: string
          format: date-time
          example: 2026-06-20T12:00:00Z

    PaymentStatus:
      type: string
      enum:
        - CREATED
        - PROCESSING
        - SUCCEEDED
        - FAILED
        - CANCELLED

    ErrorResponse:
      type: object
      required:
        - error_code
        - message
      properties:
        error_code:
          type: string
          example: INVALID_REQUEST
        message:
          type: string
          example: Request validation failed
```
